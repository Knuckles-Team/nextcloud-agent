services:
  nextcloud-agent:
    # image: docker.io/knucklessg1/nextcloud-agent:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: nextcloud-agent
    hostname: nextcloud-agent
    command: [ "nextcloud-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9435"
      - "TRANSPORT=stdio"
      - "NEXTCLOUD_BASE_URL=${NEXTCLOUD_BASE_URL}"
      - "NEXTCLOUD_USERNAME=${NEXTCLOUD_USERNAME}"
      - "NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3.5-35b-a3b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9435:9435"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9435/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
